    <title>EducaNow</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        html,
        body {
            height: 100%;
        }

        body {
            background-color: rgb(6, 38, 68);
            display: flex;
            flex-direction: column;
        }


        header {
            background-color: black;
            color: white;
            padding: 10px 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        nav {
            justify-content: center;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 15px;
            padding: 0;
            margin: 0;

        }

        nav ul li {
            display: inline;
            justify-content: center;
        }

        nav ul li a {
            color: white;
            text-decoration: none;
            font-weight: bold;
            transition: color 0.3s;
        }

        nav ul li a:hover {
            color: rgb(6, 38, 68);
            
        }
        .tab-button {
            padding: 10px 20px;
            border: 1px solid #ccc;
            cursor: pointer;
        }
        .tab-content {
            display: none;
            padding: 20px;
            border: 1px solid #ccc;
           text-align: center;
           color:aliceblue;
        }
        .active {
            display: block;
        }
       
        footer {
            background-color: #000000;
            color: rgb(255, 255, 255);
            text-align: center;
            padding: 35px 0;
            margin-top: auto;
            position: relative;
        }

        footer a {
            color: #4a90e2;
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
